<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c5ce7"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="mic" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0d0ff"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- Microphone body -->
  <rect x="52" y="28" width="24" height="42" rx="12" fill="url(#mic)"/>
  <!-- Microphone base arc -->
  <path d="M42 62 C42 78, 86 78, 86 62" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- Stand -->
  <line x1="64" y1="78" x2="64" y2="90" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- Base -->
  <line x1="52" y1="90" x2="76" y2="90" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- Sound wave left -->
  <path d="M36 44 C32 48, 32 56, 36 60" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="3" stroke-linecap="round"/>
  <!-- Sound wave right -->
  <path d="M92 44 C96 48, 96 56, 92 60" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="3" stroke-linecap="round"/>
</svg>
